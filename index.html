<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

/* ══════════════════════════════════════════
   UTILITIES
   ══════════════════════════════════════════ */

// Haversine distance in nautical miles
function haversineNm(lat1,lng1,lat2,lng2){
  const R=3440.065; // earth radius in nm
  const toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function distNm(a,b){
  const la=a.coordinates?a.coordinates.lat:a.lat, lo=a.coordinates?a.coordinates.lng:a.lng;
  const lb=b.coordinates?b.coordinates.lat:b.lat, lo2=b.coordinates?b.coordinates.lng:b.lng;
  return haversineNm(la,lo,lb,lo2);
}

function fmtNm(d){return d<10?d.toFixed(1):Math.round(d)}
function eta(nm,kts){const m=Math.round(nm/kts*60);return `${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}m`}

// Boat config
const BOAT_DRAFT=2.20; // Sun Odyssey 440 draft in meters
const DEPTH_SAFETY_MARGIN=0.5; // minimum clearance under keel
const MIN_SAFE_DEPTH=BOAT_DRAFT+DEPTH_SAFETY_MARGIN; // 2.70m

const COMPASS=['N','NE','E','SE','S','SW','W','NW'];
function degToCompass(d){return COMPASS[Math.round(((d%360)+360)%360/45)%8]}

function locLat(l){return l.coordinates?l.coordinates.lat:l.lat}
function locLng(l){return l.coordinates?l.coordinates.lng:l.lng}

/* ══════════════════════════════════════════
   SUITABILITY ENGINE
   ══════════════════════════════════════════ */

function computeSuitability(loc, wx){
  if(!wx) return {status:'unknown',reasons:['No forecast'],score:0,windInfo:'no data'};
  const spd=wx.windSpeed, gust=wx.windGust||spd, dir=wx.windDir;
  const compass=degToCompass(dir);
  const exposed=loc.windProtection.exposedTo.includes(compass);
  const protected_=loc.windProtection.protectedFrom.includes(compass);
  const reasons=[];
  let status='good',score=100;

  // Wind speed + exposure
  if(spd<10){status='good';score=100;}
  else if(spd<15){
    if(exposed){status='caution';score=65;reasons.push(`${spd.toFixed(0)}kt from exposed ${compass}`);}
    else{status='good';score=85;reasons.push(`${spd.toFixed(0)}kt, protected from ${compass}`);}
  }else if(spd<20){
    if(exposed){status='poor';score=35;reasons.push(`${spd.toFixed(0)}kt from exposed ${compass}`);}
    else{status='caution';score=55;reasons.push(`${spd.toFixed(0)}kt, protected from ${compass}`);}
  }else if(spd<25){
    if(exposed){status='avoid';score=10;reasons.push(`Strong ${spd.toFixed(0)}kt from exposed ${compass}`);}
    else{status='poor';score=30;reasons.push(`Strong ${spd.toFixed(0)}kt (protected)`);}
  }else{status='avoid';score=5;reasons.push(`Dangerous ${spd.toFixed(0)}kt wind`);}

  // Gust penalty
  if(gust>30){score-=25;reasons.push(`Gusts ${gust.toFixed(0)}kt`);
    if(status==='good')status='caution';else if(status==='caution')status='poor';else if(status==='poor')status='avoid';
  }else if(gust>25){score-=15;reasons.push(`Gusts ${gust.toFixed(0)}kt`);
    if(status==='good')status='caution';else if(status==='caution')status='poor';
  }

  // Wave penalty
  if(wx.waveHeight!=null){
    if(wx.waveHeight>2.5){score-=20;reasons.push(`Waves ${wx.waveHeight.toFixed(1)}m`);
      if(status==='good')status='caution';else if(status==='caution')status='poor';
    }else if(wx.waveHeight>1.5){score-=10;reasons.push(`Waves ${wx.waveHeight.toFixed(1)}m`);}
  }

  // Settled weather penalty
  if(loc.settledWeatherOnly&&spd>12){
    score-=20;reasons.push('Settled weather required');
    if(status==='good')status='caution';else if(status==='caution')status='poor';else if(status==='poor')status='avoid';
  }

  // Overnight bonus/penalty
  if(!loc.overnightRecommended){score-=5;reasons.push('Not recommended overnight');}

  // Approach difficulty in strong wind
  if(loc.approachDifficulty==='difficult'&&spd>15){score-=10;reasons.push('Difficult approach in wind');}

  // Ferry wake
  if(loc.ferryWakeSurge&&spd>15){score-=5;reasons.push('Ferry wake + wind');}

  // Draft/depth check (2.20m draft + 0.5m safety = 2.70m minimum)
  if(loc.depth&&loc.depth.min!=null){
    if(loc.depth.min<BOAT_DRAFT){
      // Shallow spots exist, but max depth may be safe — warn, don't block if max is OK
      if(loc.depth.max>=MIN_SAFE_DEPTH){
        score-=15;reasons.push(`⚓ Shallow spots: ${loc.depth.min}m min (draft ${BOAT_DRAFT}m) — anchor in ${loc.depth.max}m+ zone`);
        if(status==='good')status='caution';
      }else{
        score-=40;reasons.push(`⚓ TOO SHALLOW: ${loc.depth.min}-${loc.depth.max}m, need ≥${MIN_SAFE_DEPTH}m for ${BOAT_DRAFT}m draft`);
        status='avoid';
      }
    }else if(loc.depth.min<MIN_SAFE_DEPTH){
      score-=10;reasons.push(`⚓ Tight clearance: min ${loc.depth.min}m, draft ${BOAT_DRAFT}m (${(loc.depth.min-BOAT_DRAFT).toFixed(1)}m under keel)`);
      if(status==='good')status='caution';
    }else if(loc.depth.min<4.0){
      score-=5;reasons.push(`Shallow areas: min ${loc.depth.min}m (${(loc.depth.min-BOAT_DRAFT).toFixed(1)}m clearance — approach with caution)`);
    }
  }

  // Recalc status from score if score dropped
  if(score>=70)status='good';else if(score>=45)status='caution';else if(score>=20)status='poor';else status='avoid';

  if(reasons.length===0)reasons.push('Suitable conditions');
  return {status,score:Math.max(0,Math.min(100,score)),reasons,
    windInfo:`${spd.toFixed(0)}kt ${compass}${gust>spd+3?` G${gust.toFixed(0)}`:''}`};
}

const SUIT_COLORS={good:'#22c55e',caution:'#eab308',poor:'#ef4444',avoid:'#64748b',unknown:'#475569'};
const SUIT_BG={good:'bg',caution:'bc',poor:'bp',avoid:'ba',unknown:'bu'};
const TYPE_BADGE={marina:'tm',port:'tp',buoy_field:'tbf',anchorage:'ta',mooring_field:'tbf'};

/* ══════════════════════════════════════════
   SCHEMA VALIDATION
   ══════════════════════════════════════════ */

const REQUIRED_FIELDS={
  id:'string', island:'string', name:'string', type:'string',
  description:'string', coordinates:'object', bottomType:'string',
  holdingQuality:'string', approachDifficulty:'string', confidence:'string',
  fallbackValue:'string'
};
const VALID_TYPES=['marina','port','buoy_field','anchorage','mooring_field'];
const VALID_HOLDING=['excellent','good','moderate','poor','unknown'];
const VALID_APPROACH=['easy','moderate','difficult'];
const VALID_CONFIDENCE=['high','medium','low'];
const VALID_FALLBACK=['high','medium','low','none'];
const REQUIRED_SERVICES=['fuel','water','electricity','provisions','restaurants'];
const COORD_BOUNDS={latMin:36.0,latMax:58.0,lngMin:-5.5,lngMax:25.0};

function validateLocations(locs){
  const errors=[], warnings=[];
  const ids=new Set();
  const valid=[];

  if(!Array.isArray(locs)){
    errors.push({id:'dataset',field:'root',msg:'locations is not an array'});
    return {valid:[],errors,warnings};
  }

  locs.forEach((loc,idx)=>{
    const lid=loc.id||`[index ${idx}]`;
    const locErrors=[];

    // Required fields + types
    for(const [f,t] of Object.entries(REQUIRED_FIELDS)){
      if(loc[f]==null){locErrors.push(`missing required field "${f}"`);}
      else if(typeof loc[f]!==t){locErrors.push(`"${f}" should be ${t}, got ${typeof loc[f]}`);}
    }

    // Duplicate ID
    if(loc.id){if(ids.has(loc.id)){locErrors.push(`duplicate id "${loc.id}"`);} ids.add(loc.id);}

    // Enum checks
    if(loc.type&&!VALID_TYPES.includes(loc.type)) locErrors.push(`type "${loc.type}" not in [${VALID_TYPES}]`);
    if(loc.holdingQuality&&!VALID_HOLDING.includes(loc.holdingQuality)) locErrors.push(`holdingQuality "${loc.holdingQuality}" invalid`);
    if(loc.approachDifficulty&&!VALID_APPROACH.includes(loc.approachDifficulty)) locErrors.push(`approachDifficulty "${loc.approachDifficulty}" invalid`);
    if(loc.confidence&&!VALID_CONFIDENCE.includes(loc.confidence)) locErrors.push(`confidence "${loc.confidence}" invalid`);
    if(loc.fallbackValue&&!VALID_FALLBACK.includes(loc.fallbackValue)) locErrors.push(`fallbackValue "${loc.fallbackValue}" invalid`);

    // Coordinates range
    if(loc.coordinates){
      const{lat,lng}=loc.coordinates;
      if(typeof lat!=='number'||typeof lng!=='number') locErrors.push('coordinates.lat/lng must be numbers');
      else if(lat<COORD_BOUNDS.latMin||lat>COORD_BOUNDS.latMax||lng<COORD_BOUNDS.lngMin||lng>COORD_BOUNDS.lngMax)
        locErrors.push(`coordinates (${lat},${lng}) outside Tāljūra voyage bounds`);
    }

    // Depth
    if(!loc.depth||loc.depth.min==null||loc.depth.max==null) warnings.push({id:lid,msg:'missing or incomplete depth data'});
    else if(loc.depth.min>loc.depth.max) locErrors.push(`depth.min (${loc.depth.min}) > depth.max (${loc.depth.max})`);

    // Wind protection
    if(!loc.windProtection||!Array.isArray(loc.windProtection.exposedTo)||!Array.isArray(loc.windProtection.protectedFrom))
      locErrors.push('windProtection must have exposedTo[] and protectedFrom[]');

    // Services object
    if(!loc.services||typeof loc.services!=='object') locErrors.push('missing services object');
    else REQUIRED_SERVICES.forEach(s=>{if(loc.services[s]==null) warnings.push({id:lid,msg:`services.${s} missing`});});

    // Booleans
    ['overnightRecommended','settledWeatherOnly','ferryWakeSurge'].forEach(b=>{
      if(loc[b]==null) warnings.push({id:lid,msg:`${b} missing (defaulting false)`});
    });

    // Hazards
    if(!Array.isArray(loc.hazards)) warnings.push({id:lid,msg:'hazards should be an array'});

    if(locErrors.length>0){
      locErrors.forEach(msg=>errors.push({id:lid,field:'',msg}));
      // Still include if it has minimum shape to render
      if(loc.id&&loc.coordinates&&loc.name) valid.push(loc);
    }else{
      valid.push(loc);
    }
  });

  // Console report
  console.group('Schema Validation');
  console.log(`${locs.length} records checked → ${valid.length} valid, ${errors.length} errors, ${warnings.length} warnings`);
  if(errors.length>0){console.warn('ERRORS:');errors.forEach(e=>console.warn(`  [${e.id}] ${e.msg}`));}
  if(warnings.length>0){console.info('WARNINGS:');warnings.forEach(w=>console.info(`  [${w.id}] ${w.msg}`));}
  console.groupEnd();

  return {valid,errors,warnings};
}

/* ══════════════════════════════════════════
   FORECAST SERVICE — clustered by proximity
   ══════════════════════════════════════════
   Clustering rule: locations within CLUSTER_RADIUS nm of an
   existing cluster centroid share one API call. With the
   current 30 locations this yields 8 clusters. The cluster
   centroid is the first location assigned to each cluster.
   ══════════════════════════════════════════ */

const CLUSTER_RADIUS_NM=3; // locations within 3nm share a forecast

function buildForecastClusters(locs){
  const clusters=[]; // [{id, lat, lng, locationIds:[]}]
  locs.forEach(loc=>{
    const lat=locLat(loc), lng=locLng(loc);
    let best=null, bestDist=Infinity;
    clusters.forEach(c=>{
      const d=haversineNm(lat,lng,c.lat,c.lng);
      if(d<CLUSTER_RADIUS_NM&&d<bestDist){best=c;bestDist=d;}
    });
    if(best){
      best.locationIds.push(loc.id);
    }else{
      clusters.push({id:`cl_${clusters.length}`,lat,lng,locationIds:[loc.id]});
    }
  });
  // Build location→cluster lookup
  const locToCluster={};
  clusters.forEach(c=>c.locationIds.forEach(lid=>{locToCluster[lid]=c.id;}));
  console.log(`Forecast clusters: ${clusters.length} clusters for ${locs.length} locations`);
  clusters.forEach(c=>console.log(`  ${c.id}: ${c.locationIds.length} locs @ (${c.lat.toFixed(3)},${c.lng.toFixed(3)}) — ${c.locationIds.join(', ')}`));
  return {clusters,locToCluster};
}

async function fetchClusterForecast(lat,lng){
  try{
    const wxRes=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=kn&timezone=Europe/Rome&forecast_days=3`);
    const wx=await wxRes.json();
    if(!wx.hourly)throw new Error('No hourly wind data');
    let mar=null;
    try{
      const marRes=await fetch(`https://api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lng}&hourly=wave_height,wave_direction,wave_period,swell_wave_height,swell_wave_direction,swell_wave_period&timezone=Europe/Rome&forecast_days=3`);
      mar=await marRes.json();
      if(!mar.hourly)mar=null;
    }catch(e){/* marine data optional */}

    const times=wx.hourly.time.map(t=>new Date(t));
    const now=new Date();
    const ci=Math.max(0,times.findIndex(t=>t>now)-1);
    const parse=(i)=>{
      const o={
        windSpeed:Math.round(wx.hourly.wind_speed_10m[i]*10)/10,
        windGust:Math.round(wx.hourly.wind_gusts_10m[i]*10)/10,
        windDir:Math.round(wx.hourly.wind_direction_10m[i]),
        waveHeight:null,waveDir:null,wavePeriod:null,swellHeight:null,swellDir:null
      };
      if(mar&&mar.hourly&&mar.hourly.wave_height){
        o.waveHeight=mar.hourly.wave_height[i];
        o.waveDir=mar.hourly.wave_direction?mar.hourly.wave_direction[i]:null;
        o.wavePeriod=mar.hourly.wave_period?mar.hourly.wave_period[i]:null;
        o.swellHeight=mar.hourly.swell_wave_height?mar.hourly.swell_wave_height[i]:null;
        o.swellDir=mar.hourly.swell_wave_direction?mar.hourly.swell_wave_direction[i]:null;
      }
      return o;
    };
    return {
      current:parse(ci),
      in12h:parse(Math.min(ci+12,times.length-1)),
      in24h:parse(Math.min(ci+24,times.length-1)),
      in48h:parse(Math.min(ci+48,times.length-1))
    };
  }catch(e){console.error('Forecast error for cluster at',lat,lng,':',e);return null;}
}

// Returns {forecasts:{clusterId:data|null}, meta:{total,ok,failed,failedIds,timestamp}}
async function fetchAllForecasts(clusters){
  const results=await Promise.all(clusters.map(c=>fetchClusterForecast(c.lat,c.lng)));
  const forecasts={};
  let ok=0,failed=0;
  const failedIds=[];
  clusters.forEach((c,i)=>{
    forecasts[c.id]=results[i];
    if(results[i])ok++; else{failed++;failedIds.push(c.id);}
  });
  const meta={total:clusters.length,ok,failed,failedIds,timestamp:Date.now()};
  console.log(`Forecast fetch: ${ok}/${clusters.length} OK, ${failed} failed`);
  return {forecasts,meta};
}

// ——— ROUTE PLANNER ———
function RoutePlanner({locs,forecasts,getSuit,routes,setRoutes,plan,setPlan}){
  const capo=locs.find(l=>l.id==='h01');
  const cur=routes[plan];

  const setStop=(day,id)=>{
    setRoutes(p=>{const u=[...p[plan]];u[day]=id||null;return {...p,[plan]:u};});
  };
  const removeStop=(day)=>{
    setRoutes(p=>{const u=[...p[plan]];u[day]=null;return {...p,[plan]:u};});
  };
  const moveStop=(day,dir)=>{
    setRoutes(p=>{
      const u=[...p[plan]];const j=day+dir;
      if(j<0||j>5)return p;
      [u[day],u[j]]=[u[j],u[day]];
      return {...p,[plan]:u};
    });
  };

  // Compute legs
  const legs=useMemo(()=>{
    const result=[];let totalNm=0,prevLoc=capo;
    for(let i=0;i<6;i++){
      const id=cur[i];
      const loc=id?locs.find(l=>l.id===id):null;
      if(loc&&prevLoc){
        const nm=distNm(prevLoc,loc);totalNm+=nm;
        const suit=getSuit(loc);
        const warnings=[];
        if(nm>20)warnings.push(`Long leg: ${fmtNm(nm)}nm`);
        if(suit.status==='poor'||suit.status==='avoid')warnings.push(`Destination ${suit.status}: ${suit.reasons[0]}`);
        if(loc.approachDifficulty==='difficult')warnings.push('Difficult approach');
        if(loc.settledWeatherOnly)warnings.push('Settled weather only');
        if(!loc.overnightRecommended)warnings.push('Not recommended overnight');
        // Depth/draft warnings
        if(loc.depth&&loc.depth.min!=null){
          if(loc.depth.min<BOAT_DRAFT&&loc.depth.max<MIN_SAFE_DEPTH)warnings.push(`🚫 TOO SHALLOW: ${loc.depth.min}-${loc.depth.max}m — need ≥${MIN_SAFE_DEPTH}m for ${BOAT_DRAFT}m draft`);
          else if(loc.depth.min<BOAT_DRAFT)warnings.push(`⚓ Shallow spots: min ${loc.depth.min}m — stay in ${Math.ceil(MIN_SAFE_DEPTH)}m+ zone (draft ${BOAT_DRAFT}m)`);
          else if(loc.depth.min<MIN_SAFE_DEPTH)warnings.push(`⚓ Tight clearance: ${loc.depth.min}m min, only ${(loc.depth.min-BOAT_DRAFT).toFixed(1)}m under keel`);
          else if(loc.depth.min<4.0)warnings.push(`Shallow area: ${loc.depth.min}m min (${(loc.depth.min-BOAT_DRAFT).toFixed(1)}m clearance — approach with caution)`);
        }
        // Nearest fallback
        const fallbacks=locs.filter(l=>l.fallbackValue==='high'&&l.id!==loc.id)
          .map(f=>({...f,d:distNm(loc,f)})).sort((a,b)=>a.d-b.d);
        if(fallbacks.length>0){const fb=fallbacks[0];warnings.push(`Nearest fallback: ${fb.name} (${fmtNm(fb.d)}nm)`);}
        result.push({day:i,loc,nm,totalNm,suit,warnings,eta55:eta(nm,5.5),eta65:eta(nm,6.5)});
        prevLoc=loc;
      }else{
        result.push({day:i,loc:null,nm:0,totalNm,suit:null,warnings:[],eta55:'--',eta65:'--'});
        if(loc)prevLoc=loc;
      }
    }
    // Return leg
    const lastLoc=cur.slice().reverse().find(Boolean);
    const last=lastLoc?locs.find(l=>l.id===lastLoc):null;
    const retNm=last&&capo?distNm(last,capo):0;
    return {legs:result,totalNm:totalNm+retNm,returnNm:retNm};
  },[cur,locs,forecasts,getSuit]);

  return <div className="rp">
    <div className="plan-sel">
      <button className={`plan-btn ${plan==='A'?'on':''}`} onClick={()=>setPlan('A')}>Plan A</button>
      <button className={`plan-btn ${plan==='B'?'on':''}`} onClick={()=>setPlan('B')}>Plan B</button>
    </div>
    <div style={{fontSize:'.85rem',color:'#94a3b8',marginBottom:'1rem'}}>
      <b style={{color:'#e2e8f0'}}>Start / Return:</b> Piraeus Marina <span style={{color:'#64748b',fontSize:'.8rem'}}>(Sun departure → Fri return, Sat check-in)</span>
    </div>
    {legs.legs.map(({day,loc,nm,suit,warnings,eta55,eta65})=><div key={day} className="day">
      <div className="day-hdr">
        <span className="day-num">Day {day+1} <span style={{color:'#94a3b8',fontWeight:400,fontSize:'.8rem'}}>{['Sun','Mon','Tue','Wed','Thu','Fri'][day]}</span></span>
        {cur[day]&&<div style={{display:'flex',gap:'.3rem'}}>
          <button className="btn-s" onClick={()=>moveStop(day,-1)}>↑</button>
          <button className="btn-s" onClick={()=>moveStop(day,1)}>↓</button>
          <button className="btn-x" onClick={()=>removeStop(day)}>✕</button>
        </div>}
      </div>
      <select value={cur[day]||''} onChange={e=>setStop(day,e.target.value)}>
        <option value="">— Select stop —</option>
        {locs.filter(l=>l.id!=='piraeus_marina').map(l=><option key={l.id} value={l.id}>{l.name} ({l.island}){l.overnightRecommended?' ☾':' ⚠ not overnight'}</option>)}
      </select>
      {loc&&<div className="leg-info">
        <div className="leg-row"><span className="leg-l">Distance</span><span className="leg-v">{fmtNm(nm)} nm</span></div>
        <div className="leg-row"><span className="leg-l">ETA @ 5.5kt</span><span className="leg-v">{eta55}</span></div>
        <div className="leg-row"><span className="leg-l">ETA @ 6.5kt</span><span className="leg-v">{eta65}</span></div>
        <div className="leg-row"><span className="leg-l">Suitability</span><span className="leg-v"><SuitBadge s={suit}/></span></div>
        <div className="leg-row"><span className="leg-l">Holding</span><span className="leg-v">{loc.holdingQuality} • {loc.bottomType}</span></div>
        <div className="leg-row"><span className="leg-l">Depth</span><span className="leg-v" style={loc.depth.min<MIN_SAFE_DEPTH?{color:loc.depth.min<BOAT_DRAFT?'#ef4444':'#eab308'}:{}}>{loc.depth.min}-{loc.depth.max}m{loc.depth.min<MIN_SAFE_DEPTH?` (${(loc.depth.min-BOAT_DRAFT).toFixed(1)}m clearance)`:''}</span></div>
      </div>}
      {warnings.length>0&&<div className="warn">{warnings.map((w,i)=><div key={i}>⚠ {w}</div>)}</div>}
    </div>)}
    {legs.returnNm>0&&<div className="day" style={{borderColor:'#475569'}}>
      <div className="day-hdr"><span className="day-num" style={{color:'#94a3b8'}}>Return to Piraeus</span></div>
      <div className="leg-info">
        <div className="leg-row"><span className="leg-l">Distance</span><span className="leg-v">{fmtNm(legs.returnNm)} nm</span></div>
        <div className="leg-row"><span className="leg-l">ETA @ 5.5kt</span><span className="leg-v">{eta(legs.returnNm,5.5)}</span></div>
        <div className="leg-row"><span className="leg-l">ETA @ 6.5kt</span><span className="leg-v">{eta(legs.returnNm,6.5)}</span></div>
      </div>
    </div>}
    <div className="totals">
      <div className="tot-row"><span className="tot-l">Total Trip Distance</span><span className="tot-v">{fmtNm(legs.totalNm)} nm</span></div>
      <div className="tot-row"><span className="tot-l">Est. Sailing Time @ 5.5kt</span><span className="tot-v">{eta(legs.totalNm,5.5)}</span></div>
      <div className="tot-row"><span className="tot-l">Est. Sailing Time @ 6.5kt</span><span className="tot-v">{eta(legs.totalNm,6.5)}</span></div>
      <div className="tot-row"><span className="tot-l">Active stops</span><span className="tot-v">{cur.filter(Boolean).length} / 6</span></div>
    </div>
  </div>;
}

// ——— MAP VIEW ———
function MapView({locs,forecasts,getSuit,route}){
  const mapRef=useRef(null);const mapInst=useRef(null);const markersRef=useRef([]);const routeLineRef=useRef(null);
  const [selected,setSelected]=useState(null);
  const [filters,setFilters]=useState({goodOnly:false,fuelOnly:false,overnightOnly:false});
  const capo=locs.find(l=>l.id==='h01');

  useEffect(()=>{
    if(mapRef.current&&!mapInst.current){
      mapInst.current=L.map(mapRef.current).setView([48.0,10.0],4);
      // Use CartoDB tiles (no Referer requirement — works from file:// and http://)
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',maxZoom:19,subdomains:'abcd'}).addTo(mapInst.current);
      L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openseamap.org">OpenSeaMap</a>',maxZoom:18,opacity:0.85}).addTo(mapInst.current);
    }
  },[]);

  useEffect(()=>{
    if(!mapInst.current)return;
    // Clear old markers
    markersRef.current.forEach(m=>mapInst.current.removeLayer(m));
    markersRef.current=[];
    if(routeLineRef.current){mapInst.current.removeLayer(routeLineRef.current);routeLineRef.current=null;}

    const visible=locs.filter(l=>{
      if(filters.goodOnly){const s=getSuit(l);if(s.status!=='good')return false;}
      if(filters.fuelOnly&&!l.services.fuel)return false;
      if(filters.overnightOnly&&!l.overnightRecommended)return false;
      return true;
    });

    visible.forEach(loc=>{
      const s=getSuit(loc);
      const c=SUIT_COLORS[s.status]||'#475569';
      const r=loc.type==='marina'?10:loc.type==='port'?8:loc.type==='buoy_field'?7:6;
      const m=L.circleMarker([locLat(loc),locLng(loc)],{
        radius:r,fillColor:c,color:'#fff',weight:1.5,opacity:.8,fillOpacity:.85
      }).addTo(mapInst.current);
      m.bindTooltip(loc.name,{direction:'top',offset:[0,-8]});
      m.on('click',()=>setSelected(loc));
      markersRef.current.push(m);
    });

    // Draw route
    if(route&&capo){
      const pts=[[locLat(capo),locLng(capo)]];
      route.forEach(id=>{if(id){const l=locs.find(x=>x.id===id);if(l)pts.push([locLat(l),locLng(l)]);}});
      if(pts.length>1){
        pts.push([locLat(capo),locLng(capo)]);
        routeLineRef.current=L.polyline(pts,{color:'#38bdf8',weight:2.5,opacity:.7,dashArray:'8,6'}).addTo(mapInst.current);
      }
    }
  },[locs,forecasts,filters,route]);

  const selSuit=selected?getSuit(selected):null;
  const selDist=selected&&capo?distNm(capo,selected):0;

  return <div className="map-wrap">
    <div ref={mapRef} id="map"></div>
    <div className="map-legend">
      <h4>Suitability</h4>
      {[['Good','#22c55e'],['Caution','#eab308'],['Poor','#ef4444'],['Avoid','#64748b']].map(([l,c])=>
        <div key={l} className="ml-row"><div className="ml-dot" style={{backgroundColor:c}}></div>{l}</div>)}
      <h4 style={{marginTop:'.5rem'}}>Size = type</h4>
      <div className="ml-row" style={{fontSize:'.72rem',color:'#94a3b8'}}>Large=marina, Med=port, Small=anchorage</div>
    </div>
    <div className="map-filters">
      <h4>Filters</h4>
      {[['goodOnly','Good only'],['fuelOnly','Fuel stops'],['overnightOnly','Overnight safe']].map(([k,l])=>
        <label key={k} className="mf-opt"><input type="checkbox" checked={filters[k]} onChange={()=>setFilters(p=>({...p,[k]:!p[k]}))}/>{l}</label>)}
    </div>
    {selected&&<div className="map-panel">
      <button className="mp-close" onClick={()=>setSelected(null)}>✕</button>
      <div style={{marginBottom:'.75rem'}}><TypeBadge t={selected.type}/> <SuitBadge s={selSuit}/></div>
      <h3 style={{fontSize:'1.15rem',color:'#e2e8f0',marginBottom:'.2rem'}}>{selected.name}</h3>
      <div style={{fontSize:'.85rem',color:'#94a3b8',marginBottom:'1rem'}}>{selected.island} • {fmtNm(selDist)}nm from base</div>
      <p style={{fontSize:'.85rem',color:'#cbd5e1',marginBottom:'1rem'}}>{selected.description}</p>
      <div style={{fontSize:'.83rem'}}>
        <div style={{marginBottom:'.75rem'}}><b style={{color:'#e2e8f0'}}>Why {selSuit.status}:</b><br/>{selSuit.reasons.join('; ')}</div>
        <div style={{marginBottom:'.5rem'}}><b>Wind protection:</b> {selected.windProtection.protectedFrom.join(', ')||'None'}</div>
        <div style={{marginBottom:'.5rem'}}><b>Exposed to:</b> {selected.windProtection.exposedTo.join(', ')||'None'}</div>
        <div style={{marginBottom:'.5rem'}}><b>Depth:</b> {selected.depth.min}-{selected.depth.max}m • <b>Bottom:</b> {selected.bottomType}
          {selected.depth.min<BOAT_DRAFT&&selected.depth.max<MIN_SAFE_DEPTH&&<span style={{color:'#ef4444',fontWeight:700}}> 🚫 TOO SHALLOW FOR {BOAT_DRAFT}m DRAFT</span>}
          {selected.depth.min<BOAT_DRAFT&&selected.depth.max>=MIN_SAFE_DEPTH&&<span style={{color:'#eab308',fontWeight:600}}> ⚓ Shallow spots — stay in deep zone</span>}
          {selected.depth.min>=BOAT_DRAFT&&selected.depth.min<MIN_SAFE_DEPTH&&<span style={{color:'#eab308',fontWeight:600}}> ⚓ Tight clearance ({(selected.depth.min-BOAT_DRAFT).toFixed(1)}m under keel)</span>}
        </div>
        <div style={{marginBottom:'.5rem'}}><b>Holding:</b> {selected.holdingQuality} • <b>Approach:</b> {selected.approachDifficulty}</div>
        <div style={{marginBottom:'.5rem'}}><b>Overnight:</b> {selected.overnightRecommended?'Yes':'No'} • <b>Settled only:</b> {selected.settledWeatherOnly?'Yes':'No'}</div>
        {selected.hazards.length>0&&<div style={{marginBottom:'.5rem'}}><b>Hazards:</b> {selected.hazards.join(', ')}</div>}
        <SvcBar s={selected.services}/>
        <div style={{marginBottom:'.5rem'}}><b>Confidence:</b> {selected.confidence} • <b>Fallback value:</b> {selected.fallbackValue}</div>
        {selected.navilyUrl&&<a href={selected.navilyUrl} target="_blank" rel="noopener" style={{color:'#38bdf8',fontSize:'.83rem'}}>View on Navily →</a>}
      </div>
    </div>}
  </div>;
}

// ——— LOCATIONS VIEW with full filters ———
function LocationsView({locs,forecasts,getSuit,getWx}){
  const [expanded,setExpanded]=useState(null);
  const [f,setF]=useState({island:null,type:null,goodNW:false,goodE:false,goodNE:false,overnight:false,settled:false,fuel:false,water:false,elec:false,fallback:false,suitGood:false,suitTomorrow:false,safeDepth:false});
  const capo=locs.find(l=>l.id==='h01');

  const islands=[...new Set(locs.map(l=>l.island))].sort();
  const types=[...new Set(locs.map(l=>l.type))];

  const toggle=(k)=>setF(p=>({...p,[k]:!p[k]}));
  const setIsland=(v)=>setF(p=>({...p,island:p.island===v?null:v}));
  const setType=(v)=>setF(p=>({...p,type:p.type===v?null:v}));
  const clearAll=()=>setF({island:null,type:null,goodNW:false,goodE:false,goodNE:false,overnight:false,settled:false,fuel:false,water:false,elec:false,fallback:false,suitGood:false,suitTomorrow:false,safeDepth:false});

  const filtered=useMemo(()=>{
    return locs.filter(l=>l.id!=='piraeus_marina').filter(l=>{
      if(f.island&&l.island!==f.island)return false;
      if(f.type&&l.type!==f.type)return false;
      if(f.goodNW&&!l.windProtection.protectedFrom.includes('NW'))return false;
      if(f.goodE&&!l.windProtection.protectedFrom.includes('E'))return false;
      if(f.goodNE&&!l.windProtection.protectedFrom.includes('NE'))return false;
      if(f.overnight&&!l.overnightRecommended)return false;
      if(f.settled&&l.settledWeatherOnly)return false; // exclude settled-only
      if(f.fuel&&!l.services.fuel)return false;
      if(f.water&&!l.services.water)return false;
      if(f.elec&&!l.services.electricity)return false;
      if(f.fallback&&l.fallbackValue==='none')return false;
      if(f.safeDepth&&l.depth&&l.depth.min<MIN_SAFE_DEPTH)return false;
      if(f.suitGood&&getSuit(l).status!=='good')return false;
      if(f.suitTomorrow){
        const fc=getWx(l);
        if(fc){const s=computeSuitability(l,fc.in24h);if(s.status!=='good')return false;}
      }
      return true;
    }).sort((a,b)=>getSuit(b).score-getSuit(a).score);
  },[locs,f,forecasts]);

  return <div>
    <div className="fbar">
      <span style={{fontSize:'.78rem',color:'#94a3b8',fontWeight:600,marginRight:'.3rem'}}>Island:</span>
      {islands.map(i=><button key={i} className={`fbtn ${f.island===i?'on':''}`} onClick={()=>setIsland(i)}>{i}</button>)}
      <div className="fsep"/>
      <span style={{fontSize:'.78rem',color:'#94a3b8',fontWeight:600,marginRight:'.3rem'}}>Type:</span>
      {types.map(t=><button key={t} className={`fbtn ${f.type===t?'on':''}`} onClick={()=>setType(t)}>{t.replace('_',' ')}</button>)}
    </div>
    <div className="fbar">
      <button className={`fbtn ${f.goodNW?'on':''}`} onClick={()=>toggle('goodNW')}>Good in NW/Mistral</button>
      <button className={`fbtn ${f.goodE?'on':''}`} onClick={()=>toggle('goodE')}>Good in Easterly</button>
      <button className={`fbtn ${f.goodNE?'on':''}`} onClick={()=>toggle('goodNE')}>Good in NE/Grecale</button>
      <div className="fsep"/>
      <button className={`fbtn ${f.overnight?'on':''}`} onClick={()=>toggle('overnight')}>Overnight safe</button>
      <button className={`fbtn ${f.settled?'on':''}`} onClick={()=>toggle('settled')}>Exclude settled-only</button>
      <div className="fsep"/>
      <button className={`fbtn ${f.fuel?'on':''}`} onClick={()=>toggle('fuel')}>Fuel</button>
      <button className={`fbtn ${f.water?'on':''}`} onClick={()=>toggle('water')}>Water</button>
      <button className={`fbtn ${f.elec?'on':''}`} onClick={()=>toggle('elec')}>Electricity</button>
      <div className="fsep"/>
      <button className={`fbtn ${f.safeDepth?'on':''}`} onClick={()=>toggle('safeDepth')}>Safe depth (≥{MIN_SAFE_DEPTH}m)</button>
      <button className={`fbtn ${f.fallback?'on':''}`} onClick={()=>toggle('fallback')}>Fallback stops</button>
      <button className={`fbtn ${f.suitGood?'on':''}`} onClick={()=>toggle('suitGood')}>Suitable tonight</button>
      <button className={`fbtn ${f.suitTomorrow?'on':''}`} onClick={()=>toggle('suitTomorrow')}>Suitable tomorrow</button>
      <div className="fsep"/>
      <button className="fbtn" onClick={clearAll} style={{color:'#fca5a5'}}>Clear all</button>
    </div>
    <div style={{fontSize:'.82rem',color:'#94a3b8',marginBottom:'.75rem'}}>{filtered.length} locations shown</div>
    <div className="grid3">
      {filtered.map(loc=>{
        const s=getSuit(loc);const isExp=expanded===loc.id;
        const d=capo?distNm(capo,loc):0;
        return <div key={loc.id} className="loc" onClick={()=>setExpanded(isExp?null:loc.id)}>
          <div className="loc-hdr">
            <div className="loc-name">
              <span className="cdot" style={{background:{high:'#22c55e',medium:'#eab308',low:'#ef4444'}[loc.confidence]}}></span>
              {loc.name} <span className="loc-island">{loc.island}</span>
            </div>
            <SuitBadge s={s}/>
          </div>
          <div className="loc-meta"><TypeBadge t={loc.type}/> {s.windInfo} • {fmtNm(d)}nm from base</div>
          <SvcBar s={loc.services}/>
          {loc.hazards.length>0&&<div style={{fontSize:'.78rem',color:'#f59e0b',marginBottom:'.3rem'}}>⚠ {loc.hazards.slice(0,2).join(' • ')}</div>}
          {isExp&&<div className="loc-exp">
            <div className="row"><span className="lbl">Description</span></div>
            <div style={{marginBottom:'.5rem',color:'#94a3b8'}}>{loc.description}</div>
            <div className="row"><span className="lbl">Protected from</span><span className="val">{loc.windProtection.protectedFrom.join(', ')}</span></div>
            <div className="row"><span className="lbl">Exposed to</span><span className="val">{loc.windProtection.exposedTo.join(', ')}</span></div>
            <div className="row"><span className="lbl">Depth</span><span className="val" style={loc.depth.min<MIN_SAFE_DEPTH?{color:loc.depth.min<BOAT_DRAFT?'#ef4444':'#eab308'}:{}}>{loc.depth.min}–{loc.depth.max}m{loc.depth.min<MIN_SAFE_DEPTH?` ⚓ ${(loc.depth.min-BOAT_DRAFT).toFixed(1)}m clearance`:''}</span></div>
            <div className="row"><span className="lbl">Bottom / Holding</span><span className="val">{loc.bottomType} / {loc.holdingQuality}</span></div>
            <div className="row"><span className="lbl">Approach</span><span className="val">{loc.approachDifficulty}</span></div>
            <div className="row"><span className="lbl">Overnight</span><span className="val">{loc.overnightRecommended?'✓ Yes':'✗ No'}</span></div>
            <div className="row"><span className="lbl">Settled only</span><span className="val">{loc.settledWeatherOnly?'Yes':'No'}</span></div>
            <div className="row"><span className="lbl">Ferry wake</span><span className="val">{loc.ferryWakeSurge?'Yes':'No'}</span></div>
            <div className="row"><span className="lbl">Cost</span><span className="val">{loc.costLevel||'unknown'}</span></div>
            <div className="row"><span className="lbl">Fallback value</span><span className="val">{loc.fallbackValue}</span></div>
            <div className="row"><span className="lbl">Confidence</span><span className="val">{loc.confidence}</span></div>
            <div className="row"><span className="lbl">Suitability reasons</span><span className="val">{s.reasons.join('; ')}</span></div>
            {loc.notes&&<div style={{marginTop:'.5rem',padding:'.5rem',background:'#0f172a',borderRadius:'2px',fontSize:'.8rem',color:'#94a3b8'}}>{loc.notes}</div>}
            {loc.navilyUrl&&<a href={loc.navilyUrl} target="_blank" rel="noopener" style={{color:'#38bdf8',fontSize:'.82rem',display:'block',marginTop:'.5rem'}}>View on Navily →</a>}
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

// ——— COMPARE VIEW ———
function CompareView({locs,forecasts,getSuit}){
  const [sel,setSel]=useState([]);
  const capo=locs.find(l=>l.id==='h01');
  const toggle=(id)=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):p.length<4?[...p,id]:p);
  const clear=()=>setSel([]);
  const selLocs=sel.map(id=>locs.find(l=>l.id===id)).filter(Boolean);

  return <div>
    <div className="fbar" style={{flexWrap:'wrap'}}>
      <span style={{fontSize:'.82rem',color:'#94a3b8',fontWeight:600}}>Select up to 4:</span>
      {locs.filter(l=>l.id!=='piraeus_marina').map(l=>
        <button key={l.id} className={`fbtn ${sel.includes(l.id)?'on':''}`} onClick={()=>toggle(l.id)}>{l.name}</button>
      )}
      <div className="fsep"/>
      <button className="fbtn" onClick={clear} style={{color:'#fca5a5'}}>Clear</button>
    </div>
    {selLocs.length===0&&<div className="empty">Select 2–4 locations above to compare</div>}
    <div className="cmp-grid">
      {selLocs.map(loc=>{
        const s=getSuit(loc);const d=capo?distNm(capo,loc):0;
        const svcCount=Object.values(loc.services).filter(Boolean).length;
        return <div key={loc.id} className="cmp-card">
          <h4>{loc.name} <span style={{fontWeight:400,fontSize:'.82rem',color:'#94a3b8'}}>{loc.island}</span></h4>
          <div className="cmp-row"><span className="cmp-l">Suitability</span><span className="cmp-v"><SuitBadge s={s}/></span></div>
          <div className="cmp-row"><span className="cmp-l">Score</span><span className="cmp-v">{s.score}/100</span></div>
          <div className="cmp-row"><span className="cmp-l">Wind</span><span className="cmp-v">{s.windInfo}</span></div>
          <div className="cmp-row"><span className="cmp-l">Type</span><span className="cmp-v"><TypeBadge t={loc.type}/></span></div>
          <div className="cmp-row"><span className="cmp-l">Protected</span><span className="cmp-v">{loc.windProtection.protectedFrom.join(', ')}</span></div>
          <div className="cmp-row"><span className="cmp-l">Exposed</span><span className="cmp-v">{loc.windProtection.exposedTo.join(', ')}</span></div>
          <div className="cmp-row"><span className="cmp-l">Depth</span><span className="cmp-v" style={loc.depth.min<MIN_SAFE_DEPTH?{color:loc.depth.min<BOAT_DRAFT?'#ef4444':'#eab308'}:{}}>{loc.depth.min}–{loc.depth.max}m{loc.depth.min<MIN_SAFE_DEPTH?` (${(loc.depth.min-BOAT_DRAFT).toFixed(1)}m clearance)`:''}</span></div>
          <div className="cmp-row"><span className="cmp-l">Bottom</span><span className="cmp-v">{loc.bottomType}</span></div>
          <div className="cmp-row"><span className="cmp-l">Holding</span><span className="cmp-v">{loc.holdingQuality}</span></div>
          <div className="cmp-row"><span className="cmp-l">Overnight</span><span className="cmp-v">{loc.overnightRecommended?'✓':'✗'}</span></div>
          <div className="cmp-row"><span className="cmp-l">Settled only</span><span className="cmp-v">{loc.settledWeatherOnly?'Yes':'No'}</span></div>
          <div className="cmp-row"><span className="cmp-l">Services</span><span className="cmp-v">{svcCount}/8</span></div>
          <div className="cmp-row"><span className="cmp-l">Fuel</span><span className="cmp-v">{loc.services.fuel?'✓':'✗'}</span></div>
          <div className="cmp-row"><span className="cmp-l">Water</span><span className="cmp-v">{loc.services.water?'✓':'✗'}</span></div>
          <div className="cmp-row"><span className="cmp-l">Electricity</span><span className="cmp-v">{loc.services.electricity?'✓':'✗'}</span></div>
          <div className="cmp-row"><span className="cmp-l">Distance from base</span><span className="cmp-v">{fmtNm(d)}nm</span></div>
          <div className="cmp-row"><span className="cmp-l">Approach</span><span className="cmp-v">{loc.approachDifficulty}</span></div>
          <div className="cmp-row"><span className="cmp-l">Fallback value</span><span className="cmp-v">{loc.fallbackValue}</span></div>
          {loc.hazards.length>0&&<div className="cmp-row"><span className="cmp-l">Hazards</span><span className="cmp-v" style={{color:'#fcd34d'}}>{loc.hazards.join(', ')}</span></div>}
          {/* Distances to other selected locations */}
          {selLocs.filter(o=>o.id!==loc.id).map(o=>
            <div key={o.id} className="cmp-row"><span className="cmp-l">→ {o.name}</span><span className="cmp-v">{fmtNm(distNm(loc,o))}nm</span></div>
          )}
        </div>;
      })}
    </div>
  </div>;
}

// ——— FORECAST STATUS BANNER ———
function ForecastBanner({meta,onRetry,validationIssues}){
  if(!meta)return null;
  const ts=meta.timestamp?new Date(meta.timestamp):null;
  const age=ts?Math.round((Date.now()-meta.timestamp)/60000):null;
  const stale=age!=null&&age>30;
  let status,color,bg;
  if(meta.ok===meta.total){status='Live forecast';color='#86efac';bg='rgba(34,197,94,.08)';}
  else if(meta.ok>0){status=`Partial forecast (${meta.ok}/${meta.total} clusters)`;color='#fcd34d';bg='rgba(245,158,11,.08)';}
  else{status='Forecast unavailable — suitability is not live';color='#fca5a5';bg='rgba(239,68,68,.08)';}
  return <div style={{background:bg,border:`1px solid ${color}33`,padding:'.4rem 1rem',fontSize:'.78rem',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'.3rem'}}>
    <span style={{color}}>
      <b>{status}</b>
      {stale&&<span style={{color:'#fca5a5'}}> (stale — {age}min ago)</span>}
      {ts&&!stale&&<span style={{color:'#94a3b8'}}> — updated {ts.toLocaleTimeString()}</span>}
      {meta.failed>0&&<span style={{color:'#fca5a5'}}> — {meta.failed} cluster(s) failed</span>}
    </span>
    <div style={{display:'flex',gap:'.5rem',alignItems:'center'}}>
      {validationIssues>0&&<span style={{color:'#fcd34d'}}>⚠ {validationIssues} data issue(s)</span>}
      <button className="btn-s" onClick={onRetry} style={{fontSize:'.72rem'}}>↻ Refresh forecast</button>
    </div>
  </div>;
}

// ——— MAIN APP ———
function App(){
  const [locs,setLocs]=useState(null);
  const [forecasts,setForecasts]=useState({});
  const [fcMeta,setFcMeta]=useState(null);
  const [clusterInfo,setClusterInfo]=useState(null); // {clusters,locToCluster}
  const [validationResult,setValidationResult]=useState(null);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [tab,setTab]=useState('dashboard');
  const [routes,setRoutes]=useState({A:Array(6).fill(null),B:Array(6).fill(null)});
  const [activePlan,setActivePlan]=useState('A');

  const doFetchForecasts=useCallback(async(cls)=>{
    if(!cls||!cls.clusters)return;
    const{forecasts:fc,meta}=await fetchAllForecasts(cls.clusters);
    setForecasts(fc);
    setFcMeta(meta);
  },[]);

  useEffect(()=>{
    (async()=>{
      const data=await loadLocations();
      if(!data){setError('Could not load data/locations.json. Serve this folder via HTTP:\n\nbash serve.sh\n\nThen open http://localhost:8080');setLoading(false);return;}
      // Validate
      const vr=validateLocations(data);
      setValidationResult(vr);
      if(vr.valid.length===0){setError('No valid locations in dataset. Check console for validation errors.');setLoading(false);return;}
      setLocs(vr.valid);
      // Build clusters from validated locations
      const cls=buildForecastClusters(vr.valid);
      setClusterInfo(cls);
      // Fetch forecasts
      const{forecasts:fc,meta}=await fetchAllForecasts(cls.clusters);
      setForecasts(fc);
      setFcMeta(meta);
      setLoading(false);
    })();
  },[]);

  const getWx=useCallback((loc)=>{
    if(!clusterInfo)return null;
    const cid=clusterInfo.locToCluster[loc.id];
    return cid?forecasts[cid]||null:null;
  },[forecasts,clusterInfo]);

  const getSuit=useCallback((loc)=>{
    const fc=getWx(loc);
    return computeSuitability(loc,fc?fc.current:null);
  },[getWx]);

  if(loading)return <div className="app"><div className="hdr"><h1>Tāljūra 2022 · Rīga → Barselona</h1></div><div className="loading">Loading locations and fetching forecasts...</div></div>;
  if(error)return <div className="app"><div className="hdr"><h1>Tāljūra 2022 · Rīga → Barselona</h1></div><div className="main"><div className="err"><pre>{error}</pre></div></div></div>;

  // Find a representative forecast for the header wind display
  const centralClusterId=clusterInfo?clusterInfo.locToCluster['piraeus_marina']||Object.keys(forecasts).find(k=>forecasts[k]):null;
  const central=centralClusterId?forecasts[centralClusterId]:Object.values(forecasts).find(Boolean);
  const valIssues=validationResult?(validationResult.errors.length+validationResult.warnings.length):0;

  return <div className="app">
    <div className="hdr">
      <div style={{display:'flex',alignItems:'center'}}>
        <h1>Tāljūra 2022 · Rīga → Barselona</h1>
        {central&&<span className="hdr-wind">
          <b>{central.current.windSpeed}kt {degToCompass(central.current.windDir)}</b>
          {central.current.windGust>central.current.windSpeed+3&&` G${central.current.windGust}`}
          {central.current.waveHeight!=null&&` • ${central.current.waveHeight.toFixed(1)}m`}
        </span>}
      </div>
      <span style={{fontSize:'.78rem',color:'#64748b'}}>Sun Odyssey 440 • Draft {BOAT_DRAFT}m • Piraeus</span>
    </div>
    <ForecastBanner meta={fcMeta} onRetry={()=>doFetchForecasts(clusterInfo)} validationIssues={valIssues}/>
    <div className="tabs">
      {[['dashboard','Dashboard'],['planner','Route Planner'],['map','Map'],['locations','Locations'],['compare','Compare']].map(([k,l])=>
        <button key={k} className={`tab ${tab===k?'on':''}`} onClick={()=>setTab(k)}>{l}</button>)}
    </div>
    <div className="main">
      {tab==='dashboard'&&<Dashboard locs={locs} forecasts={forecasts} getWx={getWx} getSuit={getSuit}/>}
      {tab==='planner'&&<RoutePlanner locs={locs} forecasts={forecasts} getSuit={getSuit} routes={routes} setRoutes={setRoutes} plan={activePlan} setPlan={setActivePlan}/>}
      {tab==='map'&&<MapView locs={locs} forecasts={forecasts} getSuit={getSuit} route={routes[activePlan]}/>}
      {tab==='locations'&&<LocationsView locs={locs} forecasts={forecasts} getSuit={getSuit} getWx={getWx}/>}
      {tab==='compare'&&<CompareView locs={locs} forecasts={forecasts} getSuit={getSuit}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
